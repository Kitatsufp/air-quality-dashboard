<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AQI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.main { padding:20px; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:10px; }
canvas { height:300px !important; }
</style>
</head>

<body>

<div class="main">
    <div class="card">
        <h3>📡 AQI Real (Blog)</h3>
        <canvas id="blogChart"></canvas>
    </div>

    <div class="card">
        <h3>📊 AQI Predict</h3>
        <canvas id="predictChart"></canvas>
    </div>
</div>

<script>
let blogChart = null;
let predictChart = null;

window.onload = () => {
    loadBlog();
    loadPredict();
};

// ===== BLOG =====
async function loadBlog() {
    try {
        const res = await fetch("https://fastapi-web-3.onrender.com/blog/daily");
        const data = await res.json();

        console.log("BLOG DATA:", data);

        if (!Array.isArray(data) || data.length === 0) {
            alert("Blog KHÔNG có data");
            return;
        }

        const labels = data.map((_, i) => i);
        const values = data.map(d => d.air_quality ?? d.value);

        console.log("BLOG VALUES:", values);

        const ctx = document.getElementById("blogChart");

        if (blogChart) blogChart.destroy();

        blogChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Real AQI",
                    data: values,
                    borderWidth: 2
                }]
            }
        });

    } catch (e) {
        console.error("BLOG ERROR:", e);
        alert("Lỗi BLOG API");
    }
}

// ===== PREDICT =====
async function loadPredict() {
    try {
        const res = await fetch("https://fastapi-web-3.onrender.com/predict/daily");
        const data = await res.json();

        console.log("PREDICT DATA:", data);

        if (!Array.isArray(data) || data.length === 0) {
            alert("Predict KHÔNG có data");
            return;
        }

        const labels = data.map((_, i) => i);
        const values = data.map(d => d.air_quality ?? d.value);

        console.log("PREDICT VALUES:", values);

        const ctx = document.getElementById("predictChart");

        if (predictChart) predictChart.destroy();

        predictChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Predict AQI",
                    data: values,
                    borderWidth: 2
                }]
            }
        });

    } catch (e) {
        console.error("PREDICT ERROR:", e);
        alert("Lỗi PREDICT API");
    }
}
</script>

</body>
</html>
