<!DOCTYPE html>
<html>

<head>
    <title>AQI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        .login-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
        }

        .login-card {
            background: #1f2937;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            color: white;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #374151;
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .main {
            width: 100%;
            height: 100vh;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .btn-logout {
            background: #e74a3b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .chart-container {
            height: 300px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-section" class="login-wrapper">
    <div class="login-card">
        <h2>🌍 AQI Dashboard</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-primary" onclick="login()">Login</button>
        <p id="status"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="main-app" style="display:none;">
    <div class="main">

        <div class="header">
            <h2>AQI Dashboard</h2>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <!-- CHART 1: PREDICT -->
        <div class="card">
            <h3>📊 Predict (8640 data)</h3>
            <div class="chart-container">
                <canvas id="predictChart"></canvas>
            </div>
        </div>

        <!-- CHART 2: REAL DATA -->
        <div class="card">
            <h3>📝 Blog (Real Sensor Data)</h3>
            <div class="chart-container">
                <canvas id="blogChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script>

let predictChart;
let blogChart;

/* LOGIN */
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("password", password);

    const res = await fetch("https://fastapi-web-3.onrender.com/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
    });

    const data = await res.json();

    if (data.access_token) {
        localStorage.setItem("token", data.access_token);
        showDashboard();
    } else {
        document.getElementById("status").innerText = "Login failed!";
    }
}

function logout() {
    localStorage.removeItem("token");
    location.reload();
}

function showDashboard() {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("main-app").style.display = "block";

    loadPredict();
    loadBlog();
}

/* CHART 1 - PREDICT */
async function loadPredict() {
    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://fastapi-web-3.onrender.com/predictions/init",
        { headers: { "Authorization": `Bearer ${token}` } }
    );

    const data = await res.json();

    const labels = data.map((_, i) => i);
    const values = data.map(d => d.value);

    const ctx = document.getElementById("predictChart").getContext("2d");

    predictChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Predict AQI",
                data: values,
                borderColor: "#4e73df",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        }
    });
}

/* CHART 2 - BLOG (REAL DATA) */
async function loadBlog() {
    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://fastapi-web-3.onrender.com/blog/daily",
        { headers: { "Authorization": `Bearer ${token}` } }
    );

    const data = await res.json();

    const labels = data.map(d => d.time);
    const values = data.map(d => d.air_quality);

    const ctx = document.getElementById("blogChart").getContext("2d");

    blogChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Real AQI",
                data: values,
                borderColor: "#1cc88a",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        }
    });
}

/* AUTO LOGIN */
if (localStorage.getItem("token")) {
    showDashboard();
}

</script>

</body>
</html>
