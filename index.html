<script>
let blogChart = null;
let predictChart = null;

window.onload = () => {
    if (localStorage.getItem("token")) {
        showDashboard();
    }
};

function logout() {
    localStorage.removeItem("token");
    location.reload();
}

function showDashboard() {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("main-app").style.display = "block";

    setTimeout(() => {
        loadBlogChart();
        loadPredictChart();
    }, 200);
}

// ================= BLOG (REAL DATA) =================
async function loadBlogChart() {
    try {
        const token = localStorage.getItem("token");

        const res = await fetch("https://fastapi-web-3.onrender.com/blog/daily", {
            headers: { Authorization: `Bearer ${token}` }
        });

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            console.warn("No BLOG data");
            return;
        }

        const labels = data.map(d =>
            d.timestamp
                ? new Date(d.timestamp).toLocaleTimeString()
                : d.id
        );

        const values = data.map(d => d.air_quality);

        const ctx = document.getElementById("realtimeChart").getContext("2d");

        if (blogChart) blogChart.destroy();

        blogChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "AQI Thực tế",
                    data: values,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

    } catch (e) {
        console.error("Blog chart error:", e);
    }
}

// ================= PREDICT =================
async function loadPredictChart() {
    try {
        const token = localStorage.getItem("token");

        const res = await fetch("https://fastapi-web-3.onrender.com/Predict/daily", {
            headers: { Authorization: `Bearer ${token}` }
        });

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            console.warn("No PREDICT data");
            return;
        }

        const labels = data.map((_, i) => i);
        const values = data.map(d => d.air_quality);

        const ctx = document.getElementById("historyChart").getContext("2d");

        if (predictChart) predictChart.destroy();

        predictChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "AQI Dự báo",
                    data: values,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

    } catch (e) {
        console.error("Predict chart error:", e);
    }
}
</script>
