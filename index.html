<!DOCTYPE html>
<html>

<head>
    <title>AQI Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>

    <!-- Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        .login-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
        }

        .login-card {
            background: #1f2937;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            color: white;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #374151;
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .main {
            width: 100%;
            height: 100vh;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .btn-logout {
            background: #e74a3b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
        }

        .chart-card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            flex: 1;
            position: relative;
        }

        canvas {
            height: 100% !important;
        }

        .reset-btn {
            margin-bottom: 10px;
            padding: 6px 12px;
            border: none;
            background: #4e73df;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .aqi-status {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-section" class="login-wrapper">
    <div class="login-card">
        <h2>🌍 AQI Dashboard</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-primary" onclick="login()">Login</button>
        <p id="status"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="main-app" style="display:none;">
    <div class="main">

        <div class="header">
            <h2>Air Quality Dashboard</h2>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <!-- HISTORY -->
        <div class="card chart-card">
            <div id="aqiStatus" class="aqi-status"></div>
            <button class="reset-btn" onclick="historyChart.resetZoom()">Reset Zoom</button>

            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <!-- REALTIME -->
        <div class="card chart-card">
            <h3>📡 Realtime AQI</h3>
            <div class="chart-container">
                <canvas id="realtimeChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script>

let historyChart;
let realtimeChart;
let realtimeBuffer = [];

/* LOGIN */
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("password", password);

    const res = await fetch("https://fastapi-web-3.onrender.com/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
    });

    const data = await res.json();

    if (data.access_token) {
        localStorage.setItem("token", data.access_token);
        showDashboard();
    } else {
        document.getElementById("status").innerText = "Login failed!";
    }
}

function logout() {
    localStorage.removeItem("token");
    location.reload();
}

/* DASHBOARD FLOW */
function showDashboard() {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("main-app").style.display = "block";

    loadHistory();
    initRealtimeChart();

    seedRealtime();

    setInterval(fetchRealtime, 2000);
}

/* HISTORY 8640 */
async function loadHistory() {
    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://fastapi-web-3.onrender.com/predictions/init",
        { headers: { "Authorization": `Bearer ${token}` } }
    );

    const data = await res.json();

    const labels = data.map((_, i) => i);
    const values = data.map(d => d.value);

    const ctx = document.getElementById("historyChart").getContext("2d");

    historyChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Predicted AQI",
                data: values,
                borderColor: "#4e73df",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
                zoom: {
                    pan: { enabled: true, mode: "x" },
                    zoom: {
                        wheel: { enabled: false },
                        drag: { enabled: true },
                        mode: "x"
                    }
                }
            }
        }
    });
}

/* REALTIME INIT */
function initRealtimeChart() {
    const ctx = document.getElementById("realtimeChart").getContext("2d");

    realtimeChart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Realtime AQI",
                data: [],
                borderColor: "#e74a3b",
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false
        }
    });
}

/* SEED DATA (QUAN TRỌNG) */
async function seedRealtime() {
    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://fastapi-web-3.onrender.com/predictions/realtime?limit=20",
        { headers: { "Authorization": `Bearer ${token}` } }
    );

    const data = await res.json();

    realtimeBuffer = data.map(d => d.value);

    realtimeChart.data.labels = realtimeBuffer.map((_, i) => i);
    realtimeChart.data.datasets[0].data = realtimeBuffer;

    realtimeChart.update();
}

/* STREAM REALTIME */
async function fetchRealtime() {
    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://fastapi-web-3.onrender.com/predictions/realtime?limit=1",
        { headers: { "Authorization": `Bearer ${token}` } }
    );

    const data = await res.json();
    if (!data.length) return;

    const point = data[0];

    if (realtimeBuffer[realtimeBuffer.length - 1] !== point.value) {
        realtimeBuffer.push(point.value);

        if (realtimeBuffer.length > 100) {
            realtimeBuffer.shift();
        }

        realtimeChart.data.labels = realtimeBuffer.map((_, i) => i);
        realtimeChart.data.datasets[0].data = realtimeBuffer;

        realtimeChart.update();
    }
}

/* AUTO LOGIN */
if (localStorage.getItem("token")) {
    showDashboard();
}

</script>

</body>
</html>
